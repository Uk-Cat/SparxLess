<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">

        <header>
            <div class="logo">Sparx<span>Less</span></div>
            <div class="header-actions">
                <button id="toggle-bookwork" class="icon-btn">Bookwork</button>
                <button id="toggle-settings" class="icon-btn">
                    <img src="Icon/SettingIcon.png" alt="Settings" id="settings-img">
                </button>
            </div>
        </header>

        <!-- Settings drawer -->
        <div id="settings-panel" class="drawer">
            <div class="drawer-header">Configuration</div>
            <div class="input-group">
                <label>API Provider</label>
                <select id="provider-select">
                    <option value="google">Google Gemini</option>
                    <option value="openrouter">OpenRouter (Free)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Model</label>
                <select id="model-select"></select>
            </div>
            <div class="input-group">
                <label>API Key</label>
                <input type="password" id="api-key-input" placeholder="Paste your key here...">
            </div>
            <div class="input-group" style="margin-top:12px;padding-top:12px;border-top:1.5px solid var(--border);">
                <label>Database Answers</label>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
                    <span style="font-size:12px;font-weight:600;color:var(--text-muted);">Show answers from database</span>
                    <button id="toggle-db-answers" class="toggle-switch" aria-pressed="true">
                        <span class="toggle-knob"></span>
                    </button>
                </div>
            </div>
            <button id="save-settings" class="primary-btn">Apply Changes</button>
        </div>

        <!-- Bookwork panel -->
        <div id="bookwork-panel" class="drawer">
            <div class="drawer-header">Saved Bookwork Answers</div>
            <div id="bookwork-content">
                <em style="font-size:11px;color:#6b7fa8;">Loading...</em>
            </div>
        </div>

        <main>
            <!-- Detected question -->
            <div class="card preview-card">
                <div class="card-header-row">
                    <label style="margin:0;">Detected Question</label>
                    <button id="copy-question-btn" class="copy-btn">Copy</button>
                </div>
                <div id="text-preview" style="font-size:13px;line-height:1.5;font-weight:600;color:#1a2744;">
                    Scanning Sparx page...
                </div>
            </div>

            <!-- Image preview -->
            <div class="card" id="image-card" style="display:none;">
                <div class="image-card-header">
                    <label style="margin:0;">Question Image</label>
                    <button id="copy-image-btn" class="copy-btn">Copy Image</button>
                </div>
                <img id="image-preview" src="" alt="Question image" />
            </div>

            <!-- Solve -->
            <button id="solve-btn" class="solve-btn">✦ Solve Problem</button>



            <!-- Result -->
            <div id="result-container" class="card result-card" style="display:none;">
                <div class="result-header">
                    <div class="status-indicator"></div>
                    <label>AI Answer</label>
                </div>
                <div id="ai-res"></div>
                <div id="toggle-raw" class="raw-toggle-btn">SHOW REASONING</div>
                <div id="raw-ai-response"></div>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
